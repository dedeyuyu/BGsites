<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BG Reference — 图片灵感库</title>
  <meta name="description" content="沉浸式图片参考与灵感收集，按分类浏览 Google Drive 云端图库">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Top Navigation ── -->
  <header class="nav" id="nav">
    <div class="nav-inner">
      <div class="nav-logo">
        <svg class="nav-logo-mark" width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect width="24" height="24" rx="6" fill="url(#lg)"/>
          <path d="M5 17l5-6 4 4.5 3-4 4 5.5H5z" fill="white" opacity=".9"/>
          <circle cx="17" cy="8" r="2.2" fill="white" opacity=".9"/>
          <defs>
            <linearGradient id="lg" x1="0" y1="0" x2="24" y2="24">
              <stop stop-color="#6366F1"/>
              <stop offset="1" stop-color="#A855F7"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="nav-logo-text">BG Reference</span>
      </div>

      <nav class="nav-cats" id="navCats" role="navigation" aria-label="图片分类">
        <!-- Injected by JS -->
      </nav>

      <button class="nav-settings" id="navSettings" aria-label="配置">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.4"/>
          <path d="M9 1.5v2M9 14.5v2M1.5 9h2M14.5 9h2M3.7 3.7l1.4 1.4M12.9 12.9l1.4 1.4M3.7 14.3l1.4-1.4M12.9 5.1l1.4-1.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Config Modal ── -->
  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-head">
        <p class="modal-title" id="modalTitle">配置 Google Drive</p>
        <button class="modal-x" id="modalX" aria-label="关闭">
          <svg width="14" height="14" viewBox="0 0 14 14"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <p class="modal-hint">输入 Google Drive 根文件夹 ID 与 API Key。第一层子文件夹自动成为分类标签。</p>
      <label class="field">
        <span class="field-label">根文件夹 ID</span>
        <input id="cfgFolder" type="text" class="field-input" placeholder="1BxiMVs0XRA5nFMd…" autocomplete="off" spellcheck="false">
        <span class="field-sub">从 Drive 文件夹链接中提取</span>
      </label>
      <label class="field">
        <span class="field-label">Google API Key</span>
        <input id="cfgKey" type="password" class="field-input" placeholder="AIza…" autocomplete="off">
        <span class="field-sub">需启用 Google Drive API</span>
      </label>
      <div class="modal-foot">
        <button class="btn-ghost" id="modalCancel">取消</button>
        <button class="btn-primary" id="modalSave">保存并加载</button>
      </div>
    </div>
  </div>

  <!-- ── Toast ── -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- ── Main ── -->
  <main class="main" id="main">

    <!-- Empty / not-configured state -->
    <div class="state-empty" id="stateEmpty">
      <div class="state-icon">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect x="6" y="12" width="36" height="28" rx="3" stroke="rgba(255,255,255,.2)" stroke-width="1.5"/>
          <circle cx="17" cy="23" r="4" stroke="rgba(255,255,255,.2)" stroke-width="1.5"/>
          <path d="M6 32l10-9 7 8 6-7 13 9.5" stroke="rgba(255,255,255,.2)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <p class="state-title">尚未配置</p>
      <p class="state-desc">点击右上角设置图标，填入 Google Drive 文件夹 ID 与 API Key</p>
      <button class="btn-primary" id="stateBtn">立即配置</button>
    </div>

    <!-- Loading state -->
    <div class="state-loading" id="stateLoading" style="display:none">
      <div class="loading-bar"><div class="loading-bar-fill" id="loadBar"></div></div>
      <p class="state-desc" id="loadLabel">正在加载…</p>
    </div>

    <!-- No results -->
    <div class="state-empty" id="stateNone" style="display:none">
      <p class="state-title">没有图片</p>
      <p class="state-desc">当前分类暂无内容，试试其他标签</p>
    </div>

    <!-- Masonry grid -->
    <div class="masonry" id="masonry"></div>

  </main>

  <!-- Lightbox -->
  <div class="lb" id="lb">
    <button class="lb-close" id="lbClose" aria-label="关闭">
      <svg width="16" height="16" viewBox="0 0 16 16"><path d="M1 1l14 14M15 1L1 15" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
    <button class="lb-nav lb-prev" id="lbPrev" aria-label="上一张">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M11 14L5 9l6-5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="lb-nav lb-next" id="lbNext" aria-label="下一张">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M7 14l6-5-6-5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <img class="lb-img" id="lbImg" src="" alt="">
    <div class="lb-info">
      <span class="lb-cat" id="lbCat"></span>
      <span class="lb-name" id="lbName"></span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
