<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BG Reference — 图片灵感库</title>
  <meta name="description" content="沉浸式图片参考与灵感收集，按分类浏览 Google Drive 云端图库">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Navigation ── -->
  <header class="nav" id="nav">
    <div class="nav-inner">
      <!-- Logo -->
      <div class="nav-logo">
        <svg class="nav-logo-mark" width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect width="24" height="24" rx="6" fill="url(#lg)"/>
          <path d="M5 17l5-6 4 4.5 3-4 4 5.5H5z" fill="white" opacity=".9"/>
          <circle cx="17" cy="8" r="2.2" fill="white" opacity=".9"/>
          <defs>
            <linearGradient id="lg" x1="0" y1="0" x2="24" y2="24">
              <stop stop-color="#6366F1"/>
              <stop offset="1" stop-color="#A855F7"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="nav-logo-text">BG Reference</span>
      </div>

      <!-- Right actions -->
      <div class="nav-right">
        <!-- Category toggle button -->
        <button class="cat-toggle-btn" id="catToggleBtn" aria-expanded="false" aria-controls="catPanel" style="display:none">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M1 3h13M3 7.5h9M5.5 12h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <span id="catToggleLabel">分类筛选</span>
          <span class="cat-badge" id="catBadge" style="display:none">0</span>
          <svg class="cat-chevron" id="catChevron" width="13" height="13" viewBox="0 0 13 13" fill="none">
            <path d="M2.5 4.5L6.5 8.5L10.5 4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <!-- Refresh cache button -->
        <button class="nav-icon-btn" id="refreshBtn" title="刷新图片列表" style="display:none" aria-label="刷新">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M13 7A6 6 0 101 7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M13 3v4h-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <!-- Settings -->
        <button class="nav-icon-btn" id="navSettings" aria-label="配置">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="2.2" stroke="currentColor" stroke-width="1.3"/>
            <path d="M8 1.5v1.5M8 13v1.5M1.5 8H3M13 8h1.5M3.4 3.4l1.1 1.1M11.5 11.5l1.1 1.1M3.4 12.6l1.1-1.1M11.5 4.5l1.1-1.1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ── Category Panel (slides down from nav) ── -->
  <div class="cat-panel" id="catPanel" aria-hidden="true">
    <div class="cat-panel-inner">
      <div class="cat-chips-wrap" id="catChipsWrap">
        <!-- Chips injected by JS -->
      </div>
      <div class="cat-panel-foot">
        <button class="cat-clear-btn" id="catClearBtn">
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          清除筛选
        </button>
        <span class="cat-result-count" id="catResultCount"></span>
      </div>
    </div>
  </div>
  <!-- Panel backdrop (click to close) -->
  <div class="cat-backdrop" id="catBackdrop"></div>

  <!-- ── Config Modal ── -->
  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-head">
        <p class="modal-title" id="modalTitle">配置 Google Drive</p>
        <button class="modal-x" id="modalX" aria-label="关闭">
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </button>
      </div>
      <p class="modal-hint">输入 Google Drive 根文件夹 ID 与 API Key。第一层子文件夹自动成为分类。</p>
      <label class="field">
        <span class="field-label">根文件夹 ID</span>
        <input id="cfgFolder" type="text" class="field-input" placeholder="1BxiMVs0XRA5nFMd…" autocomplete="off" spellcheck="false">
        <span class="field-sub">从 Drive 文件夹链接中提取</span>
      </label>
      <label class="field">
        <span class="field-label">Google API Key</span>
        <input id="cfgKey" type="password" class="field-input" placeholder="AIza…" autocomplete="off">
        <span class="field-sub">需启用 Google Drive API</span>
      </label>
      <div class="modal-foot">
        <button class="btn-ghost" id="modalCancel">取消</button>
        <button class="btn-primary" id="modalSave">保存并加载</button>
      </div>
    </div>
  </div>

  <!-- ── Toast ── -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- ── Main ── -->
  <main class="main" id="main">
    <!-- Empty -->
    <div class="state-box" id="stateEmpty">
      <div class="state-icon">
        <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
          <rect x="5" y="11" width="34" height="26" rx="3" stroke="rgba(255,255,255,.22)" stroke-width="1.4"/>
          <circle cx="15" cy="21" r="3.5" stroke="rgba(255,255,255,.22)" stroke-width="1.4"/>
          <path d="M5 30l9-8 6 7 5.5-6 12.5 8.5" stroke="rgba(255,255,255,.22)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <p class="state-title">尚未配置</p>
      <p class="state-desc">点击右上角设置图标，填入 Google Drive 文件夹 ID 与 API Key</p>
      <button class="btn-primary" id="stateBtn">立即配置</button>
    </div>

    <!-- Loading -->
    <div class="state-box" id="stateLoading" style="display:none">
      <div class="loading-track"><div class="loading-fill" id="loadFill"></div></div>
      <p class="state-desc" id="loadLabel">正在连接 Google Drive…</p>
    </div>

    <!-- No results -->
    <div class="state-box" id="stateNone" style="display:none">
      <p class="state-title">没有图片</p>
      <p class="state-desc">当前筛选条件下无图片，试试其他分类</p>
      <button class="btn-ghost" id="clearFilterBtn">清除筛选</button>
    </div>

    <!-- Grid -->
    <div class="masonry" id="masonry" style="display:none"></div>
  </main>

  <!-- ── Lightbox ── -->
  <div class="lb" id="lb">
    <button class="lb-close" id="lbClose" aria-label="关闭">
      <svg width="14" height="14" viewBox="0 0 14 14"><path d="M1 1l12 12M13 1L1 13" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
    <button class="lb-nav lb-prev" id="lbPrev" aria-label="上一张">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 13L4 8l6-5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="lb-nav lb-next" id="lbNext" aria-label="下一张">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 13l6-5-6-5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <img class="lb-img" id="lbImg" src="" alt="">
    <div class="lb-info">
      <span class="lb-cat" id="lbCat"></span>
      <span class="lb-name" id="lbName"></span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
